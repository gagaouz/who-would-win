name: WhoWouldWin
options:
  bundleIdPrefix: com.whowouldin
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.13.0"
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: "2.7.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.whowouldin.WhoWouldWin
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: 8U69B876XS
    CODE_SIGN_STYLE: Automatic

targets:
  WhoWouldWin:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WhoWouldWin
        excludes:
          - "**/.DS_Store"
          - "CarPlay/**"
    resources:
      - path: WhoWouldWin/Assets.xcassets
      - path: WhoWouldWin/Fonts
        optional: true
    dependencies:
      - package: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whowouldin.WhoWouldWin
        INFOPLIST_FILE: WhoWouldWin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: WhoWouldWin/Info.plist
      properties:
        CFBundleDisplayName: "Animal vs Animal"
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Speak the name of any animal to search or add a custom fighter."
        NSSpeechRecognitionUsageDescription: "Speak the name of any animal to search or add a custom fighter."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - PressStart2P-Regular.ttf
          - Bungee-Regular.ttf
          - LilitaOne-Regular.ttf
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        LSApplicationQueriesSchemes: []
        GADApplicationIdentifier: "ca-app-pub-4887593367953664~8348884640"

  WhoWouldWinTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WhoWouldWinTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whowouldin.WhoWouldWinTests
    dependencies:
      - target: WhoWouldWin

  WhoWouldWinUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WhoWouldWinUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whowouldin.WhoWouldWinUITests
        TEST_TARGET_NAME: WhoWouldWin
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WhoWouldWin
